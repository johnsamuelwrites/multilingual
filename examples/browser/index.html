<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multilingual → WASM demo</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #0f0f0f;
      color: #e0e0e0;
    }
    h1 { color: #7ec8e3; margin-bottom: 0.25rem; }
    p.subtitle { color: #888; margin-top: 0; }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.4rem; }
    textarea {
      width: 100%;
      box-sizing: border-box;
      background: #111;
      color: #c9d1d9;
      border: 1px solid #444;
      border-radius: 4px;
      font-family: "Fira Code", "Cascadia Code", monospace;
      font-size: 0.9rem;
      padding: 0.6rem;
      resize: vertical;
    }
    .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    select {
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      font-size: 0.9rem;
    }
    button {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.45rem 1.1rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #444; cursor: default; }
    #status { font-size: 0.8rem; color: #888; }
    pre#output {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.75rem 1rem;
      font-family: "Fira Code", "Cascadia Code", monospace;
      font-size: 0.875rem;
      min-height: 3rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: #7ee787;
    }
    .badge {
      display: inline-block;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 0.15rem 0.6rem;
      font-size: 0.75rem;
      color: #aaa;
      margin-left: 0.4rem;
    }
  </style>
</head>
<body>
  <h1>Multilingual → WASM <span class="badge">browser demo</span></h1>
  <p class="subtitle">
    Source code compiled to WebAssembly. Only a tiny WASI <code>fd_write</code>
    polyfill is needed — no custom JavaScript host functions.
  </p>

  <div class="card">
    <label for="source">Source — edit and hit Run</label>
    <textarea id="source" rows="14" spellcheck="false">def fibonacci(n):
    let a = 0
    let b = 1
    let count = 0
    while count < n:
        let temp = b
        b = a + b
        a = temp
        count = count + 1
    return a

let i = 0
while i < 15:
    print(fibonacci(i))
    i = i + 1</textarea>
  </div>

  <div class="card">
    <div class="row">
      <label for="lang" style="margin:0">Language:</label>
      <select id="lang">
        <option value="en" selected>English (en)</option>
        <option value="fr">French (fr)</option>
        <option value="de">German (de)</option>
        <option value="es">Spanish (es)</option>
        <option value="it">Italian (it)</option>
        <option value="pt">Portuguese (pt)</option>
        <option value="nl">Dutch (nl)</option>
        <option value="sv">Swedish (sv)</option>
        <option value="da">Danish (da)</option>
        <option value="fi">Finnish (fi)</option>
        <option value="pl">Polish (pl)</option>
        <option value="ar">Arabic (ar)</option>
        <option value="zh">Chinese (zh)</option>
        <option value="ja">Japanese (ja)</option>
        <option value="hi">Hindi (hi)</option>
        <option value="bn">Bengali (bn)</option>
        <option value="ta">Tamil (ta)</option>
      </select>
      <button id="runBtn">▶ Run</button>
      <span id="status"></span>
    </div>
  </div>

  <div class="card">
    <label>Output</label>
    <pre id="output">(press Run)</pre>
  </div>

  <!--
    The compiler runs in-browser via Pyodide (Python → WASM).
    If Pyodide is unavailable the page falls back to a pre-built app.wasm
    built by running:  python build.py
  -->
  <script type="module">
    const runBtn   = document.getElementById("runBtn");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const sourceEl = document.getElementById("source");
    const langEl   = document.getElementById("lang");

    // ── Per-language Fibonacci examples ───────────────────────────────────
    const EXAMPLES = {
      en: `def fibonacci(n):
    let a = 0
    let b = 1
    let count = 0
    while count < n:
        let temp = b
        b = a + b
        a = temp
        count = count + 1
    return a

let i = 0
while i < 15:
    print(fibonacci(i))
    i = i + 1`,

      fr: `déf fibonacci(n):
    soit a = 0
    soit b = 1
    soit count = 0
    tantque count < n:
        soit temp = b
        b = a + b
        a = temp
        count = count + 1
    retour a

soit i = 0
tantque i < 15:
    afficher(fibonacci(i))
    i = i + 1`,

      de: `def fibonacci(n):
    sei a = 0
    sei b = 1
    sei count = 0
    solange count < n:
        sei temp = b
        b = a + b
        a = temp
        count = count + 1
    rückgabe a

sei i = 0
solange i < 15:
    ausgeben(fibonacci(i))
    i = i + 1`,

      es: `def fibonacci(n):
    sea a = 0
    sea b = 1
    sea count = 0
    mientras count < n:
        sea temp = b
        b = a + b
        a = temp
        count = count + 1
    devolver a

sea i = 0
mientras i < 15:
    imprimir(fibonacci(i))
    i = i + 1`,

      it: `definisci fibonacci(n):
    sia a = 0
    sia b = 1
    sia count = 0
    mentre count < n:
        sia temp = b
        b = a + b
        a = temp
        count = count + 1
    ritorna a

sia i = 0
mentre i < 15:
    stampa(fibonacci(i))
    i = i + 1`,

      pt: `defina fibonacci(n):
    seja a = 0
    seja b = 1
    seja count = 0
    enquanto count < n:
        seja temp = b
        b = a + b
        a = temp
        count = count + 1
    retorne a

seja i = 0
enquanto i < 15:
    imprima(fibonacci(i))
    i = i + 1`,

      nl: `definieer fibonacci(n):
    laat a = 0
    laat b = 1
    laat count = 0
    terwijl count < n:
        laat temp = b
        b = a + b
        a = temp
        count = count + 1
    retourneer a

laat i = 0
terwijl i < 15:
    afdrukken(fibonacci(i))
    i = i + 1`,

      sv: `definiera fibonacci(n):
    lat a = 0
    lat b = 1
    lat count = 0
    medan count < n:
        lat temp = b
        b = a + b
        a = temp
        count = count + 1
    retur a

lat i = 0
medan i < 15:
    skriv(fibonacci(i))
    i = i + 1`,

      da: `definer fibonacci(n):
    lad a = 0
    lad b = 1
    lad count = 0
    mens count < n:
        lad temp = b
        b = a + b
        a = temp
        count = count + 1
    returner a

lad i = 0
mens i < 15:
    skriv(fibonacci(i))
    i = i + 1`,

      fi: `maarittele fibonacci(n):
    olkoon a = 0
    olkoon b = 1
    olkoon count = 0
    kun count < n:
        olkoon temp = b
        b = a + b
        a = temp
        count = count + 1
    palauta a

olkoon i = 0
kun i < 15:
    tulosta(fibonacci(i))
    i = i + 1`,

      pl: `funkcja fibonacci(n):
    niech a = 0
    niech b = 1
    niech count = 0
    dopoki count < n:
        niech temp = b
        b = a + b
        a = temp
        count = count + 1
    zwroc a

niech i = 0
dopoki i < 15:
    drukuj(fibonacci(i))
    i = i + 1`,

      ar: `دالة fibonacci(n):
    ليكن a = 0
    ليكن b = 1
    ليكن count = 0
    طالما count < n:
        ليكن temp = b
        b = a + b
        a = temp
        count = count + 1
    إرجاع a

ليكن i = 0
طالما i < 15:
    اطبع(fibonacci(i))
    i = i + 1`,

      zh: `函数 fibonacci(n):
    令 a = 0
    令 b = 1
    令 count = 0
    当 count < n:
        令 temp = b
        b = a + b
        a = temp
        count = count + 1
    返回 a

令 i = 0
当 i < 15:
    打印(fibonacci(i))
    i = i + 1`,

      ja: `関数 fibonacci(n):
    変数 a = 0
    変数 b = 1
    変数 count = 0
    間 count < n:
        変数 temp = b
        b = a + b
        a = temp
        count = count + 1
    戻る a

変数 i = 0
間 i < 15:
    表示(fibonacci(i))
    i = i + 1`,

      hi: `परिभाषा fibonacci(n):
    मान a = 0
    मान b = 1
    मान count = 0
    जबतक count < n:
        मान temp = b
        b = a + b
        a = temp
        count = count + 1
    वापसी a

मान i = 0
जबतक i < 15:
    छापो(fibonacci(i))
    i = i + 1`,

      bn: `সংজ্ঞা fibonacci(n):
    ধরি a = 0
    ধরি b = 1
    ধরি count = 0
    যতক্ষণ count < n:
        ধরি temp = b
        b = a + b
        a = temp
        count = count + 1
    ফেরত a

ধরি i = 0
যতক্ষণ i < 15:
    ছাপাও(fibonacci(i))
    i = i + 1`,

      ta: `வரையறு fibonacci(n):
    இருக்கட்டும் a = 0
    இருக்கட்டும் b = 1
    இருக்கட்டும் count = 0
    வரை count < n:
        இருக்கட்டும் temp = b
        b = a + b
        a = temp
        count = count + 1
    திருப்பு a

இருக்கட்டும் i = 0
வரை i < 15:
    அச்சிடு(fibonacci(i))
    i = i + 1`,
    };

    // Swap the example source when the language changes.
    langEl.addEventListener("change", () => {
      const lang = langEl.value;
      if (EXAMPLES[lang]) {
        sourceEl.value = EXAMPLES[lang];
        outputEl.textContent = "(press Run)";
        statusEl.textContent = "";
      }
    });

    // ── WASI shim ────────────────────────────────────────────────────────────
    // Implements wasi_snapshot_preview1.fd_write so stdout goes to outputEl.
    function makeWasiImports(memoryRef) {
      const dec = new TextDecoder("utf-8");
      let buf = "";
      function flush() {
        let nl;
        while ((nl = buf.indexOf("\n")) !== -1) {
          outputEl.textContent += buf.slice(0, nl) + "\n";
          buf = buf.slice(nl + 1);
        }
      }
      return {
        wasi_snapshot_preview1: {
          fd_write(fd, iovsPtr, iovsLen, nwrittenPtr) {
            if (fd !== 1 && fd !== 2) return 8;
            const mem = memoryRef.current;
            if (!mem) return 8;
            const view = new DataView(mem.buffer);
            let written = 0;
            for (let i = 0; i < iovsLen; i++) {
              const ptr = view.getUint32(iovsPtr + i * 8, true);
              const len = view.getUint32(iovsPtr + i * 8 + 4, true);
              buf += dec.decode(new Uint8Array(mem.buffer, ptr, len));
              written += len;
            }
            flush();
            view.setUint32(nwrittenPtr, written, true);
            return 0;
          },
        },
      };
    }

    // ── Run via pre-built app.wasm (fallback) ─────────────────────────────
    async function runPrebuilt() {
      statusEl.textContent = "Loading app.wasm …";
      const resp = await fetch("app.wasm");
      if (!resp.ok) throw new Error("app.wasm not found — run build.py first");
      const bytes = await resp.arrayBuffer();
      return runWasm(new Uint8Array(bytes));
    }

    // Last loaded WASM exports, accessible from the browser console.
    // E.g.: wasmExports.fibonacci(10)
    window.wasmExports = null;

    async function runWasm(wasmBytes) {
      const memRef = { current: null };
      const imports = makeWasiImports(memRef);
      const result = await WebAssembly.instantiate(wasmBytes, imports);
      const exp = result.instance.exports;
      memRef.current = exp.memory;
      window.wasmExports = exp;
      if (exp.__ml_reset) exp.__ml_reset();   // reset heap between runs
      outputEl.textContent = "";
      if (exp.__main) exp.__main();
      // List callable numeric exports in the console for discoverability.
      const callable = Object.keys(exp).filter(
        k => typeof exp[k] === "function" && !k.startsWith("__") && k !== "memory"
      );
      if (callable.length) {
        console.info(
          "[multilingual] callable exports: " + callable.join(", ") +
          "\nCall via: wasmExports.<name>(...args)"
        );
      }
    }

    // ── Run via Pyodide (in-browser Python compiler) ──────────────────────
    let pyodide = null;

    async function loadPyodide() {
      if (pyodide) return pyodide;
      statusEl.textContent = "Loading Pyodide (first run only) …";
      const { loadPyodide: load } = await import(
        "https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.mjs"
      );
      pyodide = await load();
      // Install the multilingual package from the repo root (served locally).
      await pyodide.loadPackage("micropip");
      const micropip = pyodide.pyimport("micropip");
      try {
        await micropip.install("multilingualprogramming");
      } catch {
        // Fall back to loading from the current origin (dev server).
        pyodide.runPython(`
import sys, pathlib
sys.path.insert(0, "/")
`);
      }
      return pyodide;
    }

    // Sentinel type so the button handler can tell compilation errors apart
    // from infrastructure failures (Pyodide not loading, wasmtime missing).
    class CompileError extends Error {
      constructor(msg) { super(msg); this.name = "CompileError"; }
    }

    function formatPythonError(raw) {
      // Pyodide wraps Python tracebacks in PythonError.message.
      // Extract the last "ErrorType: message" line for a concise display.
      const lines = String(raw).split("\n").filter(Boolean);
      const summary = lines[lines.length - 1] || String(raw);
      return summary;
    }

    // ── WAT → WASM via wabt.js (no Python wasmtime needed) ───────────────
    let wabtModule = null;

    async function loadWabt() {
      if (wabtModule) return wabtModule;
      // wabt is the WebAssembly Binary Toolkit compiled to JS/WASM.
      // It handles the full WAT text format including multi-value returns,
      // mutable globals, tables, and every feature this compiler generates.
      const { default: WabtModule } = await import(
        "https://cdn.jsdelivr.net/npm/wabt@1.0.36/index.js"
      );
      wabtModule = await WabtModule();
      return wabtModule;
    }

    async function watToWasm(watText) {
      const wabt = await loadWabt();
      const mod = wabt.parseWat("input.wat", watText, {});
      mod.validate();
      const { buffer } = mod.toBinary({});
      mod.destroy();
      return new Uint8Array(buffer);
    }

    async function compileAndRun(source, lang) {
      const py = await loadPyodide();
      statusEl.textContent = "Compiling …";
      let wat;
      try {
        wat = py.runPython(`
from multilingualprogramming.lexer.lexer import Lexer
from multilingualprogramming.parser.parser import Parser
from multilingualprogramming.codegen.wat_generator import WATCodeGenerator
tokens = Lexer(${JSON.stringify(source)}, language=${JSON.stringify(lang)}).tokenize()
prog = Parser(tokens, source_language=${JSON.stringify(lang)}).parse()
WATCodeGenerator().generate(prog)
`);
      } catch (err) {
        throw new CompileError(formatPythonError(err.message ?? err));
      }
      // Compile WAT → WASM using wabt.js (pure JS, no Python wasmtime needed).
      statusEl.textContent = "Assembling …";
      const wasmBytes = await watToWasm(wat);
      await runWasm(wasmBytes);
    }

    // ── Button handler ────────────────────────────────────────────────────
    runBtn.addEventListener("click", async () => {
      runBtn.disabled = true;
      statusEl.textContent = "";
      outputEl.textContent = "";
      const source = sourceEl.value;
      const lang   = langEl.value;
      try {
        // Try Pyodide first (live compilation), fall back to pre-built WASM.
        if (typeof window !== "undefined" && window.location.protocol !== "file:") {
          await compileAndRun(source, lang);
        } else {
          await runPrebuilt();
        }
        statusEl.textContent = "✓ done";
      } catch (err) {
        if (err instanceof CompileError) {
          // Syntax / parse error in the user's source — show it, don't fall back.
          statusEl.textContent = "✗ compile error";
          outputEl.textContent = err.message;
        } else {
          // Infrastructure failure (Pyodide unavailable, wasmtime missing) → try pre-built.
          try {
            await runPrebuilt();
            statusEl.textContent = "✓ done (pre-built wasm)";
          } catch (e2) {
            statusEl.textContent = "✗ error";
            outputEl.textContent = `${err.message}\n\nFallback also failed: ${e2.message}`;
          }
        }
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
